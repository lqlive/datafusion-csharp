name: release

# Build the native cdylib for every supported RID on the matching runner,
# then collect all binaries, pack the managed + per-RID native NuGet packages,
# and push them to NuGet.
#
# Triggers:
#   - push a tag like `v0.1.1`  -> version is taken from the tag and packages are published
#   - manual run (workflow_dispatch) -> build/pack only (no publish) unless a version is given

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.1.1). Leave empty to only build."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-native:
    name: native ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Every target is built natively (no `cross`): arm64 Linux uses GitHub's
      # arm64 runners and musl uses `musl-tools`. This keeps `build.rs` building
      # on the host filesystem so the repo-relative `../proto` path is always
      # visible, mirroring the upstream Java SDK's plain `cargo build` approach.
      matrix:
        include:
          - { os: windows-latest,   rid: win-x64,          target: "",                          lib: datafusion_csharp_native.dll }
          - { os: ubuntu-latest,    rid: linux-x64,         target: x86_64-unknown-linux-gnu,    lib: libdatafusion_csharp_native.so }
          - { os: ubuntu-24.04-arm, rid: linux-arm64,       target: aarch64-unknown-linux-gnu,   lib: libdatafusion_csharp_native.so }
          - { os: ubuntu-latest,    rid: linux-musl-x64,    target: x86_64-unknown-linux-musl,   lib: libdatafusion_csharp_native.so, musl: true }
          - { os: ubuntu-24.04-arm, rid: linux-musl-arm64,  target: aarch64-unknown-linux-musl,  lib: libdatafusion_csharp_native.so, musl: true }
          - { os: macos-latest,     rid: osx-x64,           target: x86_64-apple-darwin,         lib: libdatafusion_csharp_native.dylib }
          - { os: macos-latest,     rid: osx-arm64,         target: aarch64-apple-darwin,        lib: libdatafusion_csharp_native.dylib }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          key: ${{ matrix.rid }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build native library (release)
        working-directory: native
        # For musl, link libc dynamically (-crt-static off) so the produced .so
        # behaves like a normal shared object that .NET can dlopen on Alpine.
        env:
          RUSTFLAGS: ${{ matrix.musl && '-C target-feature=-crt-static' || '' }}
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}"
          else
            cargo build --release
          fi

      - name: Stage binary into target layout
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            dest="staging/${{ matrix.target }}/release"
            src="native/target/${{ matrix.target }}/release/${{ matrix.lib }}"
          else
            dest="staging/release"
            src="native/target/release/${{ matrix.lib }}"
          fi
          mkdir -p "$dest"
          cp "$src" "$dest/"
          ls -lR staging

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/
          if-no-files-found: error
          retention-days: 1

  pack-and-publish:
    name: pack & publish
    needs: build-native
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native/target
          merge-multiple: true

      - name: Show collected native binaries
        run: find native/target -name 'datafusion_csharp_native.*' -o -name 'libdatafusion_csharp_native.*' | sort

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: '${version:-<none>}'"

      - name: Pack packages
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          if [ -n "$version" ]; then
            vprop="-p:Version=$version"
          else
            vprop=""
          fi
          rm -rf nupkg
          for proj in packages/Apache.DataFusion.Native.*.csproj; do
            dotnet pack "$proj" -c Release -o nupkg $vprop
          done
          dotnet pack src/Apache.DataFusion/Apache.DataFusion.csproj -c Release -o nupkg $vprop
          ls -l nupkg

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.*nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY secret is not set"; exit 1
          fi
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
