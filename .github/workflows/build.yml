name: build

# Runs automatically on every push and pull request.
# Builds the native library for the host platform, then builds and tests the
# .NET solution against it on Linux, Windows and macOS.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      # The default bash shell resolves the MSYS `perl`, which lacks modules the
      # vendored OpenSSL build needs to configure. Point openssl-src at the
      # full Strawberry Perl that ships on the Windows runner instead.
      - name: Use Strawberry Perl for vendored OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: echo "OPENSSL_SRC_PERL=C:\Strawberry\perl\bin\perl.exe" >> "$GITHUB_ENV"

      - name: Build native library (debug)
        working-directory: native
        run: cargo build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore datafusion-csharp.slnx

      - name: Build
        run: dotnet build datafusion-csharp.slnx -c Debug --no-restore

      - name: Test
        run: dotnet test datafusion-csharp.slnx -c Debug --no-build --verbosity normal

  lint:
    name: lint (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
